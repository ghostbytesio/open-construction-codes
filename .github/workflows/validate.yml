name: validate
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Structural validation + catalog drift check
        run: node scripts/validate.mjs
      - name: Pack regenerates deterministically
        run: |
          node scripts/build-pack.mjs
          git diff --exit-code exports/occ-pack.json
